<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saketh Metta — CS Researcher & Systems Engineer</title>
  <meta name="description" content="CS Master's student at Oregon State University. PostgreSQL internals research, k3s homelab infrastructure, and systems engineering.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/letterGlitch.css">
  <link rel="stylesheet" href="/css/gooeyNav.css">
</head>
<body>

  <!-- Animated letter-glitch background -->
  <div id="letter-glitch-bg"></div>

  <!-- Loading overlay -->
  <div id="page-loader">
    <div class="loader-inner">
      <span class="loader-logo">saketh.metta</span>
      <div class="loader-bar"><div class="loader-fill"></div></div>
    </div>
  </div>

  <!-- Nav (static — always present) -->
  <nav>
    <a class="logo" href="#hero">saketh.metta</a>
    <ul class="nav-links">
      <li><a href="#about">about</a></li>
      <li><a href="#research">research</a></li>
      <li><a href="#projects">projects</a></li>
      <li><a href="#homelab">homelab</a></li>
      <li><a href="#experience">experience</a></li>
      <li><a href="#skills">skills</a></li>
      <li><a href="#contact">contact</a></li>
    </ul>
  </nav>

  <!-- Sections injected here by main.js -->
  <main id="main-content"></main>

  <!-- Footer (static — always present) -->
  <footer>
    <span class="f-copy">© 2026 Saketh Metta</span>
    <span class="f-copy">sakethmetta.org · Cloudflare Pages</span>
  </footer>

  <!-- Chatbot widget -->
  <div id="chat-widget">
    <button id="chat-toggle" aria-label="Open chat">
      <svg id="chat-icon-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <svg id="chat-icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div id="chat-panel" aria-hidden="true">
      <div id="chat-header">
        <span class="chat-title">
          <span class="chat-status-dot"></span>
          ask saketh
        </span>
        <span class="chat-subtitle">AI assistant — powered by my own model</span>
      </div>

      <div id="chat-messages">
        <div class="chat-msg bot">
          <div class="msg-bubble">Hey! I'm Saketh's AI. Ask me anything about his research, projects, or background.</div>
        </div>
      </div>

      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" maxlength="500">
        <button id="chat-send" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- UI components (vanilla) — load before main.js so it can init them -->
  <script src="/js/letterGlitch.js"></script>
  <script src="/js/gooeyNav.js"></script>
  <script src="/js/decryptedText.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
